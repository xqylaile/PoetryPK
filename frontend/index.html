    function _startIflytekRecording(wsUrl, appId) {
        // 初始化 lamejs MP3 编码器（16kHz 单声道 32kbps）
        state.iflytekEncoder = new lamejs.Mp3Encoder(1, 16000, 32);

        // 建立 WebSocket 连接
        var ws = new WebSocket(wsUrl);
        state.iflytekWs = ws;
        var wsConnected = false;

        var connectTimeout = setTimeout(function() {
            if (!wsConnected) {
                console.error('[讯飞] WebSocket 连接超时');
                showToast('语音识别连接超时，请检查网络');
                _cleanupIflytek();
            }
        }, 8000);

        ws.onopen = function() {
            clearTimeout(connectTimeout);
            wsConnected = true;
            console.log('[讯飞] WebSocket 已连接');
            _startAudioCapture(appId);
        };

        ws.onmessage = function(event) {
            try {
                var resp = JSON.parse(event.data);
                if (resp.code !== 0) {
                    console.error('[讯飞] 识别错误 code=' + resp.code + ', message=' + resp.message);
                    showToast('语音识别出错: ' + resp.code);
                    _cleanupIflytek();
                    return;
                }

                // 解析识别结果
                if (resp.data && resp.data.result && resp.data.result.ws) {
                    var text = '';
                    resp.data.result.ws.forEach(function(ws_item) {
                        ws_item.cw.forEach(function(cw_item) {
                            text += cw_item.w;
                        });
                    });

                    // sn 去重更新（讯飞流式识别可能用 pgs=rpg 模式修正之前的句子）
                    if (text) {
                        state.recognitionText = text;
                        var resultEl = $('recognize-result');
                        resultEl.textContent = text;
                        resultEl.classList.remove('empty');
                    }
                }

                // status=2 表示识别结束（收到最终结果）
                if (resp.data && resp.data.status === 2) {
                    state.iflytekFinalText = state.recognitionText;
                    console.log('[讯飞] 识别完成:', state.iflytekFinalText);
                    if (ws.readyState === WebSocket.OPEN) ws.close();
                    _onIflytekComplete();
                }
            } catch (e) {
                console.error('[讯飞] 解析响应失败:', e, event.data);
            }
        };

        ws.onerror = function(e) {
            console.error('[讯飞] WebSocket 错误:', e);
            showToast('语音识别连接失败');
            _cleanupIflytek();
        };

        ws.onclose = function(e) {
            console.log('[讯飞] WebSocket 关闭, code=' + e.code);
            if (state.isRecording && state.iflytekFinalText === '') {
                // 意外关闭，用当前文本
                state.iflytekFinalText = state.recognitionText;
                _onIflytekComplete();
            }
        };
    }

    /** 启动麦克风采音 + MP3 编码 + 流式发送 */
    function _startAudioCapture(appId) {
        navigator.mediaDevices.getUserMedia({ audio: true })
            .then(function(stream) {
                // 如果用户在异步初始化期间已松开按钮，中止启动
                if (!state.recordingIntent) {
                    stream.getTracks().forEach(function(t) { t.stop(); });
                    console.log('[讯飞] 录音已取消，中止麦克风采音');
                    return;
                }

                state.iflytekMediaStream = stream;

                var AudioCtx = window.AudioContext || window.webkitAudioContext;
                state.iflytekAudioContext = new AudioCtx({ sampleRate: 16000 });
                var source = state.iflytekAudioContext.createMediaStreamSource(stream);
                var processor = state.iflytekAudioContext.createScriptProcessor(4096, 1, 1);
                state.iflytekScriptProcessor = processor;

                processor.onaudioprocess = function(e) {
                    if (!state.isRecording) return;
                    var ws = state.iflytekWs;
                    if (!ws || ws.readyState !== WebSocket.OPEN) return;

                    // Float32 → Int16 PCM
                    var inputData = e.inputBuffer.getChannelData(0);
                    var pcm = new Int16Array(inputData.length);
                    for (var i = 0; i < inputData.length; i++) {
                        var s = Math.max(-1, Math.min(1, inputData[i]));
                        pcm[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
                    }

                    // lamejs 编码为 MP3 帧
                    var mp3Buf = state.iflytekEncoder.encodeBuffer(pcm);
                    if (mp3Buf.length === 0) return;

                    // MP3 帧 → base64
                    var binary = '';
                    for (var j = 0; j < mp3Buf.length; j++) {
                        binary += String.fromCharCode(mp3Buf[j]);
                    }
                    var audioBase64 = btoa(binary);

                    // 构建讯飞协议帧
                    var frame;
                    if (state.iflytekIsFirstFrame) {
                        frame = {
                            common: {
                                app_id: appId || state.iflytekAppId
                            },
                            business: {
                                domain: 'iat',
                                language: 'zh_cn',
                                accent: 'mandarin',
                                vad_eos: 3000
                            },
                            data: {
                                status: 0,
                                format: 'audio/L16;rate=16000',
                                encoding: 'lame',
                                audio: audioBase64
                            }
                        };
                        state.iflytekIsFirstFrame = false;
                    } else {
                        frame = {
                            data: {
                                status: 1,
                                format: 'audio/L16;rate=16000',
                                encoding: 'lame',
                                audio: audioBase64
                            }
                        };
                    }

                    try {
                        ws.send(JSON.stringify(frame));
                    } catch (sendErr) {
                        console.warn('[讯飞] 发送帧失败:', sendErr.message);
                    }
                };

                source.connect(processor);
                processor.connect(state.iflytekAudioContext.destination);

                // 更新 UI 状态
                state.isRecording = true;
                $('btn-speak').classList.add('recording');
                $('speak-text').innerHTML = '松开<br>结束';
                $('recognize-result').textContent = '正在聆听...';
                $('recognize-result').classList.remove('empty');

                // 启动倒计时（仅首次）
                if (!state.timerStarted) {
                    startCountdown(60);
                }

                console.log('[讯飞] 麦克风采音已启动 (16kHz mono → MP3)');
            })
            .catch(function(err) {
                console.error('[讯飞] 麦克风权限获取失败:', err);
                if (err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError') {
                    showToast('请允许麦克风权限后重试');
                } else {
                    showToast('无法访问麦克风: ' + err.message);
                }
                _cleanupIflytek();
            });
    }

    /** 停止讯飞录音 */
    function stopRecording() {
        if (!state.isRecording && !state.recordingIntent) return;

        state.isRecording = false;
        state.recordingIntent = false;

        // 同步更新 UI（无论异步初始化是否完成）
        $('btn-speak').classList.remove('recording');
        $('speak-text').innerHTML = '按住<br>说话';

        // 停止倒计时
        stopCountdown();

        // 刷新编码器并发送最终帧
        if (state.iflytekEncoder && state.iflytekWs && state.iflytekWs.readyState === WebSocket.OPEN) {
            var mp3End = state.iflytekEncoder.flush();
            var endAudio = '';
            if (mp3End.length > 0) {
                var binary = '';
                for (var j = 0; j < mp3End.length; j++) {
                    binary += String.fromCharCode(mp3End[j]);
                }
                endAudio = btoa(binary);
            }

            try {
                state.iflytekWs.send(JSON.stringify({
                    data: {
                        status: 2,
                        format: 'audio/L16;rate=16000',
                        encoding: 'lame',
                        audio: endAudio
                    }
                }));
                console.log('[讯飞] 已发送最终帧 (status=2)');
            } catch (e) {
                console.warn('[讯飞] 发送最终帧失败:', e.message);
            }
        }

        // 停止麦克风采集
        if (state.iflytekScriptProcessor) {
            try { state.iflytekScriptProcessor.disconnect(); } catch (e) {}
            state.iflytekScriptProcessor = null;
        }
        if (state.iflytekAudioContext) {
            try { state.iflytekAudioContext.close(); } catch (e) {}
            state.iflytekAudioContext = null;
        }
        if (state.iflytekMediaStream) {
            state.iflytekMediaStream.getTracks().forEach(function(t) { t.stop(); });
            state.iflytekMediaStream = null;
        }

        // 设置超时：如果 5 秒内没收到最终结果，用当前文本提交
        setTimeout(function() {
            if (state.iflytekFinalText === '') {
                state.iflytekFinalText = state.recognitionText;
                _onIflytekComplete();
            }
        }, 5000);
    }

    /** 讯飞识别完成回调 —— 发送答案给游戏服务端 */
    function _onIflytekComplete() {
        // 防止重复提交（超时回调 + WebSocket 回调可能都触发）
        if (state.answerSubmitted) return;
        state.answerSubmitted = true;

        _cleanupIflytek();
        var text = state.iflytekFinalText || '';

        var resultEl = $('recognize-result');
        if (text) {
            resultEl.textContent = text;
        } else {
            resultEl.textContent = '(未识别到语音内容)';
        }
        resultEl.classList.remove('empty');

        // 发送答案给游戏后端
        sendMessage({
            type: 'stop_recording',
            text: text
        });
    }

    /** 清理讯飞资源 */
    function _cleanupIflytek() {
        if (state.iflytekWs) {
            try {
                if (state.iflytekWs.readyState === WebSocket.OPEN ||
                    state.iflytekWs.readyState === WebSocket.CONNECTING) {
                    state.iflytekWs.close();
                }
            } catch (e) {}
            state.iflytekWs = null;
        }
        if (state.iflytekScriptProcessor) {
            try { state.iflytekScriptProcessor.disconnect(); } catch (e) {}
            state.iflytekScriptProcessor = null;
        }
        if (state.iflytekAudioContext) {
            try { state.iflytekAudioContext.close(); } catch (e) {}
            state.iflytekAudioContext = null;
        }
        if (state.iflytekMediaStream) {
            state.iflytekMediaStream.getTracks().forEach(function(t) { t.stop(); });
            state.iflytekMediaStream = null;
        }
        state.iflytekEncoder = null;
    }

    /* ============================================================
     *  按住说话事件绑定
     * ============================================================ */
    function setupSpeakButton() {
        var btn = $('btn-speak');

        // 阻止默认行为，防止移动端滚动
        btn.addEventListener('touchstart', function(e) {
            e.preventDefault();
            e.stopPropagation();
            startRecording();
        }, { passive: false });

        btn.addEventListener('touchend', function(e) {
            e.preventDefault();
            e.stopPropagation();
            stopRecording();
        }, { passive: false });

        btn.addEventListener('touchcancel', function(e) {
            e.preventDefault();
            stopRecording();
        }, { passive: false });

        btn.addEventListener('mousedown', function(e) {
            e.preventDefault();
            startRecording();
        });

        btn.addEventListener('mouseup', function(e) {
            e.preventDefault();
            stopRecording();
        });

        btn.addEventListener('mouseleave', function() {
            if (state.recordingIntent) {
                stopRecording();
            }
        });
    }

    /* ============================================================
     *  TTS 语音合成
     * ============================================================ */
    function speakText(text, rate, pitch) {
        if (!window.speechSynthesis) {
            console.warn('[TTS] 浏览器不支持语音合成');
            return;
        }

        // 停止之前的播放
        speechSynthesis.cancel();

        var utterance = new SpeechSynthesisUtterance(text);
        utterance.lang  = 'zh-CN';
        utterance.rate  = rate  || 0.8;
        utterance.pitch = pitch || 1.0;

        utterance.onend = function() {
            console.log('[TTS] 朗读完成');
        };

        utterance.onerror = function(e) {
            console.error('[TTS] 朗读出错:', e.error);
        };

        speechSynthesis.speak(utterance);
    }

    /* ============================================================
     *  HTML 转义
     * ============================================================ */
    function escapeHtml(str) {
        if (!str) return '';
        var div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }

    /* ============================================================
     *  获取题库数量
     * ============================================================ */
    function fetchPoemCount() {
        var protocol = location.protocol;
        var host = location.host;
        var url = protocol + '//' + host + '/api/poems/count';

        fetch(url)
            .then(function(res) { return res.json(); })
            .then(function(data) {
                var count = data.count || data.total || data.data || 0;
                $('poem-count').innerHTML = '题库共 <span>' + count + '</span> 首诗词';
            })
            .catch(function() {
                $('poem-count').textContent = '题库数量获取失败';
            });
    }

    /* ============================================================
     *  大厅操作
     * ============================================================ */
    function startGame() {
        var name1 = $('input-player1').value.trim();
        var name2 = $('input-player2').value.trim();

        if (!name1) {
            showToast('请输入玩家1姓名');
            $('input-player1').focus();
            return;
        }
        if (!name2) {
            showToast('请输入玩家2姓名');
            $('input-player2').focus();
            return;
        }

        // 确保 WebSocket 已连接
        if (!state.ws || state.ws.readyState !== WebSocket.OPEN) {
            showToast('正在连接服务器，请稍候...');
            connectWebSocket();
            // 等待连接后再发送
            setTimeout(startGame, 800);
            return;
        }

        sendMessage({
            type: 'start_game',
            player1_name: name1,
            player2_name: name2
        });
    }

    function backToLobby() {
        // 重置所有状态
        state.players      = [];
        state.scores       = {};
        state.currentPlayerId = null;
        state.currentRound = 0;
        state.isRecording  = false;
        state.recognitionText = '';
        state.timerStarted = false;
        stopCountdown();

        // 清理讯飞资源
        _cleanupIflytek();

        // 停止 TTS
        if (window.speechSynthesis) speechSynthesis.cancel();

        // 重新连接 WebSocket
        if (state.ws) {
            state.ws.close();
        }
        connectWebSocket();

        switchView('lobby');
    }

    /* ============================================================
     *  事件绑定与初始化
     * ============================================================ */
    function initEventListeners() {
        // 大厅 - 开始比赛
        $('btn-start').addEventListener('click', startGame);

        // 回车提交
        $('input-player1').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                $('input-player2').focus();
            }
        });

        $('input-player2').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                startGame();
            }
        });

        // 比赛 - 文字输入提交答案
        $('btn-submit-text').addEventListener('click', submitTextAnswer);
        $('input-answer').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                submitTextAnswer();
            }
        });
        // 开始输入时启动倒计时
        $('input-answer').addEventListener('focus', function() {
            if (!state.timerStarted && !this.disabled) {
                startCountdown(60);
            }
        });

        // 结果视图 - 返回大厅
        $('btn-back-lobby').addEventListener('click', backToLobby);
    }

    /* ============================================================
     *  页面加载初始化
     * ============================================================ */
    function init() {
        initEventListeners();
        setupSpeakButton();
        initSpeechRecognition();
        connectWebSocket();
        fetchPoemCount();

        // 如果不支持语音，在游戏视图显示提示
        if (!state.speechSupported) {
            console.warn('[初始化] 语音识别不可用，建议使用 Chrome 浏览器');
        }
    }

    // DOM 加载完成后初始化
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
    } else {
        init();
    }
    </script>
</body>
</html>
