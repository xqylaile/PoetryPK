<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>诗词PK</title>
    <link href="https://fonts.googleapis.com/css2?family=LXGW+WenKai+TC&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/lamejs@1.2.1/lame.min.js"></script>
    <style>
        /* ============ 基础重置与变量 ============ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --ink: #2c3e50;
            --paper: #f5f0e8;
            --red: #c0392b;
            --green: #27ae60;
            --gold: #d4a574;
            --light-ink: rgba(44, 62, 80, 0.1);
            --shadow: rgba(44, 62, 80, 0.15);
        }

        html, body {
            width: 100%;
            min-height: 100vh;
            min-height: 100dvh;
            font-family: 'SimSun', '宋体', serif;
            background: var(--paper);
            color: var(--ink);
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* 水墨纹理背景 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background:
                radial-gradient(ellipse at 15% 85%, rgba(44, 62, 80, 0.04) 0%, transparent 50%),
                radial-gradient(ellipse at 85% 15%, rgba(192, 57, 43, 0.03) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(44, 62, 80, 0.02) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        /* ============ 视图系统 ============ */
        .view {
            display: none;
            position: relative;
            z-index: 1;
            min-height: 100vh;
            min-height: 100dvh;
            padding: 24px 20px;
            flex-direction: column;
            align-items: center;
        }

        .view.active {
            display: flex;
            animation: viewFadeIn 0.5s ease;
        }

        @keyframes viewFadeIn {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ============ 通用组件 ============ */

        /* 卡片 */
        .card {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 4px 20px var(--shadow);
            border: 1px solid rgba(255, 255, 255, 0.5);
            width: 100%;
        }

        /* 主标题 */
        .title-main {
            font-family: 'LXGW WenKai TC', serif;
            font-size: 52px;
            font-weight: 700;
            color: var(--ink);
            text-align: center;
            letter-spacing: 16px;
            margin-bottom: 6px;
            text-shadow: 2px 2px 6px rgba(44, 62, 80, 0.15);
            position: relative;
        }

        .subtitle {
            font-family: 'LXGW WenKai TC', serif;
            font-size: 15px;
            color: rgba(44, 62, 80, 0.5);
            text-align: center;
            margin-bottom: 40px;
            letter-spacing: 4px;
        }

        /* 按钮 */
        .btn {
            font-family: 'LXGW WenKai TC', serif;
            font-size: 17px;
            padding: 13px 36px;
            border: none;
            border-radius: 28px;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 3px;
            outline: none;
            -webkit-user-select: none;
            user-select: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--ink) 0%, #34495e 100%);
            color: var(--paper);
            box-shadow: 0 4px 14px rgba(44, 62, 80, 0.35);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 18px rgba(44, 62, 80, 0.45);
        }

        .btn-primary:active {
            transform: translateY(0);
            box-shadow: 0 2px 8px rgba(44, 62, 80, 0.3);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.85);
            color: var(--ink);
            border: 2px solid var(--ink);
        }

        .btn-secondary:hover {
            background: var(--ink);
            color: var(--paper);
        }

        .btn-danger {
            background: linear-gradient(135deg, var(--red) 0%, #e74c3c 100%);
            color: #fff;
            box-shadow: 0 4px 14px rgba(192, 57, 43, 0.35);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        /* 输入框 */
        .input-field {
            width: 100%;
            font-family: 'LXGW WenKai TC', serif;
            font-size: 16px;
            padding: 13px 20px;
            border: 2px solid rgba(44, 62, 80, 0.2);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.85);
            color: var(--ink);
            outline: none;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        .input-field:focus {
            border-color: var(--ink);
            box-shadow: 0 0 0 3px rgba(44, 62, 80, 0.08);
        }

        .input-field::placeholder {
            color: rgba(44, 62, 80, 0.35);
        }

        /* 玩家标签 */
        .player-label {
            display: block;
            font-family: 'LXGW WenKai TC', serif;
            font-size: 14px;
            color: var(--ink);
            opacity: 0.7;
            margin-bottom: 6px;
            padding-left: 4px;
        }

        /* ============ 大厅视图 ============ */
        #view-lobby {
            justify-content: center;
            gap: 16px;
        }

        .lobby-card {
            max-width: 400px;
            width: 100%;
        }

        .lobby-card .card {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            color: rgba(44, 62, 80, 0.35);
            font-size: 13px;
            letter-spacing: 2px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(to right, transparent, rgba(44, 62, 80, 0.2), transparent);
        }

        .join-row {
            display: flex;
            gap: 10px;
        }

        .join-row .input-field {
            flex: 1;
            text-align: center;
            letter-spacing: 6px;
            font-size: 18px;
            font-weight: 600;
        }

        .join-row .btn {
            white-space: nowrap;
            padding: 13px 20px;
            flex-shrink: 0;
        }

        .poem-count {
            text-align: center;
            color: rgba(44, 62, 80, 0.45);
            font-size: 13px;
            margin-top: 12px;
            letter-spacing: 1px;
        }

        .poem-count span {
            color: var(--ink);
            font-weight: 700;
            font-size: 15px;
        }

        /* ============ 等待视图 ============ */
        #view-waiting {
            justify-content: center;
            gap: 24px;
        }

        .waiting-card {
            max-width: 400px;
            width: 100%;
            text-align: center;
        }

        .waiting-card .card {
            padding: 40px 24px;
        }

        .waiting-label {
            font-family: 'LXGW WenKai TC', serif;
            font-size: 16px;
            color: rgba(44, 62, 80, 0.55);
            margin-bottom: 12px;
            letter-spacing: 2px;
        }

        .room-code {
            font-family: 'LXGW WenKai TC', serif;
            font-size: 56px;
            font-weight: 700;
            color: var(--ink);
            letter-spacing: 14px;
            margin: 16px 0;
            text-shadow: 2px 3px 6px rgba(44, 62, 80, 0.12);
            -webkit-user-select: all;
            user-select: all;
        }

        .waiting-text {
            font-family: 'LXGW WenKai TC', serif;
            font-size: 16px;
            color: rgba(44, 62, 80, 0.55);
            margin: 28px 0 12px;
            letter-spacing: 2px;
        }

        /* 跳动圆点动画 */
        .dots {
            display: inline-flex;
            gap: 8px;
            vertical-align: middle;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--ink);
            animation: dotBounce 1.4s ease-in-out infinite;
        }

        .dot:nth-child(2) { animation-delay: 0.16s; }
        .dot:nth-child(3) { animation-delay: 0.32s; }

        @keyframes dotBounce {
            0%, 80%, 100% {
                transform: translateY(0);
                opacity: 0.3;
            }
            40% {
                transform: translateY(-14px);
                opacity: 1;
            }
        }

        /* ============ 比赛视图 ============ */
        #view-game {
            padding-top: 12px;
            gap: 12px;
        }

        /* 计分板 */
        .scoreboard {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            max-width: 500px;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 16px;
            box-shadow: 0 2px 12px var(--shadow);
        }

        .player-score {
            flex: 1;
            text-align: center;
            min-width: 0;
        }

        .player-score .name {
            font-family: 'LXGW WenKai TC', serif;
            font-size: 14px;
            color: rgba(44, 62, 80, 0.65);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 2px;
        }

        .player-score .score {
            font-family: 'LXGW WenKai TC', serif;
            font-size: 38px;
            font-weight: 700;
            color: var(--ink);
            line-height: 1.1;
        }

        .score-divider {
            font-family: 'LXGW WenKai TC', serif;
            font-size: 24px;
            color: rgba(44, 62, 80, 0.25);
            font-weight: 300;
            flex-shrink: 0;
        }

        .player-score.active-player {
            position: relative;
        }

        .player-score.active-player .name {
            color: var(--red);
            font-weight: 600;
        }

        /* 题目卡片 */
        .question-card {
            max-width: 500px;
            width: 100%;
            text-align: center;
            padding: 20px;
        }

        .round-info {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 14px;
            flex-wrap: wrap;
        }

        .round-number {
            font-family: 'LXGW WenKai TC', serif;
            font-size: 13px;
            color: rgba(44, 62, 80, 0.45);
            letter-spacing: 1px;
        }

        .current-turn {
            font-family: 'LXGW WenKai TC', serif;
            font-size: 13px;
            color: var(--red);
            padding: 3px 14px;
            background: rgba(192, 57, 43, 0.08);
            border-radius: 20px;
            border: 1px solid rgba(192, 57, 43, 0.15);
            letter-spacing: 1px;
        }

        .poem-info {
            font-family: 'LXGW WenKai TC', serif;
            font-size: 14px;
            color: rgba(44, 62, 80, 0.55);
            margin-bottom: 18px;
            letter-spacing: 1px;
        }

        .upper-line {
            font-family: 'LXGW WenKai TC', serif;
            font-size: 26px;
            font-weight: 600;
            color: var(--ink);
            line-height: 1.7;
            margin-bottom: 20px;
            padding: 16px 12px;
            background: linear-gradient(to bottom, rgba(44, 62, 80, 0.02), rgba(44, 62, 80, 0.05));
            border-radius: 10px;
            border-left: 3px solid var(--red);
            letter-spacing: 2px;
        }

        /* 按住说话按钮 */
        .speak-btn-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            margin-bottom: 16px;
        }

        .speak-btn {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid var(--ink);
            background: linear-gradient(145deg, rgba(255, 255, 255, 0.95), rgba(245, 240, 232, 0.95));
            color: var(--ink);
            font-family: 'LXGW WenKai TC', serif;
            font-size: 17px;
            font-weight: 600;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 16px rgba(44, 62, 80, 0.2);
            -webkit-user-select: none;
            user-select: none;
            touch-action: none;
            display: flex;
            align-items: center;
            justify-content: center;
            outline: none;
        }

        .speak-btn:active:not(:disabled) {
            transform: scale(0.95);
        }

        .speak-btn:disabled {
            opacity: 0.35;
            cursor: not-allowed;
            border-color: rgba(44, 62, 80, 0.3);
        }

        .speak-btn.recording {
            border-color: var(--red);
            background: linear-gradient(145deg, rgba(192, 57, 43, 0.08), rgba(192, 57, 43, 0.18));
            color: var(--red);
            box-shadow: 0 0 0 8px rgba(192, 57, 43, 0.08), 0 4px 16px rgba(192, 57, 43, 0.3);
            animation: recordPulse 1.5s ease-in-out infinite;
        }

        @keyframes recordPulse {
            0%, 100% {
                box-shadow: 0 0 0 8px rgba(192, 57, 43, 0.08), 0 4px 16px rgba(192, 57, 43, 0.3);
            }
            50% {
                box-shadow: 0 0 0 16px rgba(192, 57, 43, 0.04), 0 4px 20px rgba(192, 57, 43, 0.4);
            }
        }

        .speak-hint {
            font-size: 12px;
            color: rgba(44, 62, 80, 0.4);
            letter-spacing: 1px;
        }

        /* 倒计时 */
        .countdown-wrap {
            display: flex;
            justify-content: center;
            margin-bottom: 12px;
        }

        .countdown-svg {
            width: 80px;
            height: 80px;
        }

        .countdown-bg {
            fill: none;
            stroke: rgba(44, 62, 80, 0.08);
            stroke-width: 4;
        }

        .countdown-progress {
            fill: none;
            stroke: var(--ink);
            stroke-width: 4;
            stroke-linecap: round;
            transition: stroke-dashoffset 1s linear, stroke 0.5s ease;
        }

        .countdown-progress.warning {
            stroke: var(--red);
        }

        .countdown-text {
            fill: var(--ink);
            font-family: 'LXGW WenKai TC', serif;
            font-size: 24px;
            font-weight: 700;
            transition: fill 0.5s ease;
        }

        .countdown-text.warning {
            fill: var(--red);
        }

        /* 识别结果 */
        .recognize-result {
            min-height: 44px;
            padding: 10px 16px;
            font-family: 'LXGW WenKai TC', serif;
            font-size: 17px;
            color: var(--ink);
            background: rgba(255, 255, 255, 0.5);
            border-radius: 10px;
            border: 1px dashed rgba(44, 62, 80, 0.15);
            letter-spacing: 1px;
            line-height: 1.6;
            word-break: break-all;
        }

        .recognize-result.empty {
            color: rgba(44, 62, 80, 0.3);
            font-size: 14px;
        }

        /* 文字输入备选 */
        .text-input-wrap {
            display: flex;
            gap: 8px;
            align-items: center;
            width: 100%;
            margin-top: 4px;
        }

        .answer-input {
            flex: 1;
            font-size: 15px;
            padding: 10px 16px;
        }

        .answer-input:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .submit-btn {
            white-space: nowrap;
            flex-shrink: 0;
            padding: 10px 20px;
            font-size: 15px;
        }

        /* 答题反馈 */
        .feedback-area {
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            max-width: 500px;
            width: 100%;
        }

        .feedback-msg {
            font-family: 'LXGW WenKai TC', serif;
            font-size: 16px;
            padding: 10px 24px;
            border-radius: 12px;
            letter-spacing: 1px;
            animation: feedbackSlideIn 0.4s ease;
            text-align: center;
            line-height: 1.6;
        }

        .feedback-msg.correct {
            background: rgba(39, 174, 96, 0.1);
            color: var(--green);
            border: 1px solid rgba(39, 174, 96, 0.2);
        }

        .feedback-msg.wrong {
            background: rgba(192, 57, 43, 0.1);
            color: var(--red);
            border: 1px solid rgba(192, 57, 43, 0.2);
        }

        @keyframes feedbackSlideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ============ 结果视图 ============ */
        #view-result {
            gap: 18px;
            padding-bottom: 48px;
        }

        .result-title {
            font-family: 'LXGW WenKai TC', serif;
            font-size: 44px;
            font-weight: 700;
            text-align: center;
            letter-spacing: 8px;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.08);
            margin-top: 20px;
        }

        .result-title.win { color: var(--green); }
        .result-title.lose { color: var(--red); }
        .result-title.draw { color: var(--gold); }

        .result-score-card {
            max-width: 500px;
            text-align: center;
            padding: 24px;
        }

        .result-score-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 12px;
        }

        .result-player {
            text-align: center;
            min-width: 80px;
        }

        .result-player .name {
            font-family: 'LXGW WenKai TC', serif;
            font-size: 15px;
            color: rgba(44, 62, 80, 0.65);
            margin-bottom: 4px;
        }

        .result-player .score {
            font-family: 'LXGW WenKai TC', serif;
            font-size: 48px;
            font-weight: 700;
            color: var(--ink);
            line-height: 1.1;
        }

        .result-player.winner .score {
            color: var(--green);
        }

        .result-vs {
            font-family: 'LXGW WenKai TC', serif;
            font-size: 20px;
            color: rgba(44, 62, 80, 0.25);
            flex-shrink: 0;
        }

        .result-rounds {
            font-size: 14px;
            color: rgba(44, 62, 80, 0.45);
            letter-spacing: 1px;
        }

        /* 诗词赏析 */
        .analysis-title {
            font-family: 'LXGW WenKai TC', serif;
            font-size: 22px;
            font-weight: 600;
            color: var(--ink);
            text-align: center;
            letter-spacing: 6px;
            margin-top: 8px;
        }

        /* AI 解析加载动画 */
        .analysis-loading-spinner {
            width: 44px;
            height: 44px;
            margin: 0 auto;
            border: 3px solid rgba(44, 62, 80, 0.1);
            border-top-color: var(--ink);
            border-radius: 50%;
            animation: analysis-spin 0.9s linear infinite;
        }
        @keyframes analysis-spin {
            to { transform: rotate(360deg); }
        }

        .poem-analysis-card {
            max-width: 500px;
            width: 100%;
            padding: 28px;
        }

        /* 玩家标签 */
        .player-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: linear-gradient(135deg, rgba(52, 152, 219, 0.12), rgba(41, 128, 185, 0.08));
            border: 1px solid rgba(52, 152, 219, 0.25);
            border-radius: 20px;
            padding: 6px 14px;
            margin-bottom: 16px;
            font-size: 13px;
            color: #2980b9;
        }
        .player-badge-icon {
            font-size: 14px;
        }
        .player-badge-name {
            font-weight: 600;
            color: #2471a3;
        }
        .player-badge-label {
            color: rgba(41, 128, 185, 0.6);
            font-size: 12px;
        }

        /* 解析来源标签 */
        .analysis-source {
            text-align: right;
            margin-top: 16px;
            padding-top: 12px;
            border-top: 1px solid rgba(44, 62, 80, 0.06);
        }
        .source-badge {
            display: inline-block;
            font-size: 11px;
            padding: 3px 10px;
            border-radius: 12px;
            letter-spacing: 0.5px;
        }
        .source-ai {
            background: rgba(46, 204, 113, 0.1);
            color: #27ae60;
            border: 1px solid rgba(46, 204, 113, 0.25);
        }
        .source-preset {
            background: rgba(149, 165, 166, 0.12);
            color: #7f8c8d;
            border: 1px solid rgba(149, 165, 166, 0.25);
        }

        .poem-header {
            text-align: center;
            margin-bottom: 20px;
            padding-bottom: 18px;
            border-bottom: 1px solid rgba(44, 62, 80, 0.08);
        }

        .poem-header .poem-title-text {
            font-family: 'LXGW WenKai TC', serif;
            font-size: 24px;
            font-weight: 700;
            color: var(--ink);
            margin-bottom: 6px;
            letter-spacing: 2px;
        }

        .poem-header .poem-meta {
            font-size: 14px;
            color: rgba(44, 62, 80, 0.5);
            letter-spacing: 1px;
        }

        .poem-content {
            font-family: 'LXGW WenKai TC', serif;
            font-size: 18px;
            line-height: 2.2;
            color: var(--ink);
            text-align: center;
            padding: 18px 12px;
            background: linear-gradient(to bottom, rgba(44, 62, 80, 0.015), rgba(44, 62, 80, 0.04));
            border-radius: 10px;
            margin-bottom: 20px;
            letter-spacing: 1px;
            border-left: 3px solid var(--red);
        }

        .analysis-section {
            margin-bottom: 16px;
        }

        .analysis-section:last-child {
            margin-bottom: 0;
        }

        .analysis-section-title {
            font-family: 'LXGW WenKai TC', serif;
            font-size: 15px;
            font-weight: 600;
            color: var(--red);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
            letter-spacing: 1px;
        }

        .analysis-section-title::before {
            content: '';
            width: 3px;
            height: 14px;
            background: var(--red);
            border-radius: 2px;
            flex-shrink: 0;
        }

        .analysis-content {
            font-size: 14px;
            line-height: 1.9;
            color: rgba(44, 62, 80, 0.8);
            text-align: justify;
        }

        .famous-line {
            padding: 10px 14px;
            background: rgba(192, 57, 43, 0.04);
            border-radius: 8px;
            margin-bottom: 8px;
            border-left: 3px solid var(--red);
        }

        .famous-line:last-child {
            margin-bottom: 0;
        }

        .famous-line .line-text {
            font-family: 'LXGW WenKai TC', serif;
            font-size: 16px;
            color: var(--ink);
            font-weight: 600;
            margin-bottom: 4px;
            letter-spacing: 1px;
        }

        .famous-line .line-comment {
            font-size: 13px;
            color: rgba(44, 62, 80, 0.6);
            line-height: 1.7;
        }

        .theme-box {
            padding: 14px 16px;
            background: linear-gradient(135deg, rgba(212, 165, 116, 0.08), rgba(192, 57, 43, 0.05));
            border-radius: 10px;
            font-size: 14px;
            line-height: 1.9;
            color: rgba(44, 62, 80, 0.8);
        }

        /* ============ 游戏开始遮罩 ============ */
        .game-start-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(44, 62, 80, 0.65);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            animation: overlayFadeIn 0.3s ease;
        }

        .game-start-overlay.fade-out {
            animation: overlayFadeOut 0.6s ease forwards;
        }

        @keyframes overlayFadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes overlayFadeOut {
            from { opacity: 1; }
            to { opacity: 0; }
        }

        .game-start-text {
            font-family: 'LXGW WenKai TC', serif;
            font-size: 52px;
            font-weight: 700;
            color: var(--paper);
            text-shadow: 0 4px 16px rgba(0, 0, 0, 0.35);
            animation: startTextPop 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
            letter-spacing: 12px;
        }

        @keyframes startTextPop {
            0% {
                opacity: 0;
                transform: scale(0.3) translateY(20px);
            }
            100% {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        /* ============ Toast 提示 ============ */
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(44, 62, 80, 0.92);
            color: var(--paper);
            padding: 14px 28px;
            border-radius: 12px;
            font-family: 'LXGW WenKai TC', serif;
            font-size: 15px;
            z-index: 200;
            animation: toastShow 2.2s ease forwards;
            letter-spacing: 1px;
            text-align: center;
            max-width: 80vw;
            line-height: 1.6;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.25);
        }

        @keyframes toastShow {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.85); }
            12% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            75% { opacity: 1; }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(0.95); }
        }

        /* ============ 飘分动画 ============ */
        .score-float {
            position: absolute;
            font-family: 'LXGW WenKai TC', serif;
            font-size: 26px;
            font-weight: 700;
            pointer-events: none;
            animation: scoreFloat 1.6s ease-out forwards;
            z-index: 10;
            text-shadow: 0 2px 6px rgba(0, 0, 0, 0.15);
        }

        .score-float.positive { color: var(--green); }
        .score-float.negative { color: var(--red); }

        @keyframes scoreFloat {
            0% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
            60% {
                opacity: 0.8;
            }
            100% {
                opacity: 0;
                transform: translateY(-44px) scale(1.1);
            }
        }

        /* ============ 光晕效果 ============ */
        .glow-correct {
            animation: glowGreen 0.8s ease;
        }

        @keyframes glowGreen {
            0% { box-shadow: 0 4px 20px var(--shadow); }
            50% { box-shadow: 0 0 40px rgba(39, 174, 96, 0.35), 0 4px 20px var(--shadow); }
            100% { box-shadow: 0 4px 20px var(--shadow); }
        }

        .glow-wrong {
            animation: glowRed 0.6s ease;
        }

        @keyframes glowRed {
            0% { box-shadow: 0 4px 20px var(--shadow); }
            25% { box-shadow: 0 0 30px rgba(192, 57, 43, 0.3), 0 4px 20px var(--shadow); }
            50% { box-shadow: 0 4px 20px var(--shadow); }
            75% { box-shadow: 0 0 30px rgba(192, 57, 43, 0.3), 0 4px 20px var(--shadow); }
            100% { box-shadow: 0 4px 20px var(--shadow); }
        }

        /* ============ 语音不支持提示 ============ */
        .speech-warning {
            background: rgba(192, 57, 43, 0.08);
            border: 1px solid rgba(192, 57, 43, 0.2);
            border-radius: 10px;
            padding: 10px 16px;
            font-size: 13px;
            color: var(--red);
            text-align: center;
            margin-bottom: 12px;
            line-height: 1.6;
        }

        /* ============ 响应式 ============ */
        @media (max-width: 380px) {
            .title-main {
                font-size: 42px;
                letter-spacing: 10px;
            }

            .room-code {
                font-size: 44px;
                letter-spacing: 10px;
            }

            .speak-btn {
                width: 88px;
                height: 88px;
                font-size: 15px;
            }

            .upper-line {
                font-size: 22px;
            }

            .result-title {
                font-size: 36px;
            }

            .game-start-text {
                font-size: 40px;
            }
        }

        @media (min-width: 768px) {
            .view {
                padding: 32px 24px;
            }

            .title-main {
                font-size: 60px;
            }

            .upper-line {
                font-size: 28px;
            }

            .speak-btn {
                width: 110px;
                height: 110px;
                font-size: 18px;
            }
        }
    </style>
</head>
<body>

    <!-- ========== 大厅视图 ========== -->
    <div id="view-lobby" class="view active">
        <h1 class="title-main">诗词PK</h1>
        <p class="subtitle">以诗会友 · 以词论道</p>
        <div class="lobby-card">
            <div class="card">
                <label class="player-label">玩家 1</label>
                <input id="input-player1" class="input-field" type="text" placeholder="请输入玩家1姓名" maxlength="10" autocomplete="off">
                <label class="player-label" style="margin-top:12px">玩家 2</label>
                <input id="input-player2" class="input-field" type="text" placeholder="请输入玩家2姓名" maxlength="10" autocomplete="off">
                <button id="btn-start" class="btn btn-primary" style="width:100%;margin-top:16px">开始比赛</button>
            </div>
        </div>
        <p id="poem-count" class="poem-count">题库加载中...</p>
    </div>

    <!-- ========== 比赛视图 ========== -->
    <div id="view-game" class="view">
        <!-- 计分板 -->
        <div class="scoreboard" id="scoreboard">
            <div class="player-score" id="player1-box">
                <div class="name" id="player1-name">玩家1</div>
                <div class="score" id="player1-score">0</div>
            </div>
            <div class="score-divider">:</div>
            <div class="player-score" id="player2-box">
                <div class="name" id="player2-name">玩家2</div>
                <div class="score" id="player2-score">0</div>
            </div>
        </div>

        <!-- 题目卡片 -->
        <div class="card question-card" id="question-card">
            <div class="round-info">
                <span class="round-number" id="round-number">第 1 回合</span>
                <span class="current-turn" id="current-turn">等待中...</span>
            </div>
            <div class="poem-info" id="poem-info"></div>
            <div class="upper-line" id="upper-line"></div>

            <!-- 按住说话按钮 -->
            <div class="speak-btn-wrap">
                <button id="btn-speak" class="speak-btn" disabled>
                    <span id="speak-text">按住<br>说话</span>
                </button>
                <span class="speak-hint" id="speak-hint"></span>
            </div>

            <!-- 倒计时 -->
            <div class="countdown-wrap">
                <svg class="countdown-svg" viewBox="0 0 100 100">
                    <circle class="countdown-bg" cx="50" cy="50" r="42"></circle>
                    <circle class="countdown-progress" id="countdown-progress"
                            cx="50" cy="50" r="42"
                            stroke-dasharray="263.89" stroke-dashoffset="0"
                            transform="rotate(-90 50 50)"></circle>
                    <text class="countdown-text" id="countdown-text"
                          x="50" y="50" text-anchor="middle" dominant-baseline="central">60</text>
                </svg>
            </div>

            <!-- 语音识别结果 -->
            <div class="recognize-result empty" id="recognize-result">语音识别结果将显示在这里</div>

            <!-- 文字输入备选 -->
            <div class="text-input-wrap" id="text-input-wrap">
                <input id="input-answer" class="input-field answer-input" type="text"
                       placeholder="或在此输入下句..." maxlength="50" autocomplete="off" disabled>
                <button id="btn-submit-text" class="btn btn-secondary submit-btn" disabled>提交</button>
            </div>
        </div>

        <!-- 答题反馈 -->
        <div class="feedback-area" id="feedback-area"></div>
    </div>

    <!-- ========== 结果视图 ========== -->
    <div id="view-result" class="view">
        <h1 id="result-title" class="result-title">比赛结束</h1>

        <div class="card result-score-card">
            <div class="result-score-row">
                <div class="result-player" id="result-p1">
                    <div class="name" id="result-p1-name">玩家1</div>
                    <div class="score" id="result-p1-score">0</div>
                </div>
                <div class="result-vs">VS</div>
                <div class="result-player" id="result-p2">
                    <div class="name" id="result-p2-name">玩家2</div>
                    <div class="score" id="result-p2-score">0</div>
                </div>
            </div>
            <div class="result-rounds" id="result-rounds">共 0 回合</div>
        </div>

        <h2 class="analysis-title">诗词赏析</h2>
        <div id="poem-analysis-container"></div>

        <button id="btn-back-lobby" class="btn btn-primary" style="margin-top:8px">返回大厅</button>
    </div>

    <!-- ========== JavaScript ========== -->
    <script>
    'use strict';

    /* ============================================================
     *  全局状态
     * ============================================================ */
    const state = {
        currentView: 'lobby',
        ws: null,
        players: [],           // [{id, name}, ...]
        currentPlayerId: null, // 当前答题玩家的ID
        scores: {},            // { playerId: score, ... }
        currentRound: 0,
        countdownTimer: null,
        countdownValue: 60,
        isRecording: false,
        recordingIntent: false,
        answerSubmitted: false,
        recognitionText: '',
        timerStarted: false,
        // 讯飞语音识别相关
        iflytekWs: null,
        iflytekMediaStream: null,
        iflytekAudioContext: null,
        iflytekScriptProcessor: null,
        iflytekEncoder: null,
        iflytekFinalText: '',
        iflytekAppId: '',
        iflytekIsFirstFrame: true,
        speechSupported: true,
        // 调试模式：没有麦克风时设为 true，用文字输入模拟语音识别
        debugNoMic: false
    };

    /* ============================================================
     *  DOM 工具
     * ============================================================ */
    function $(id) { return document.getElementById(id); }

    function switchView(viewName) {
        document.querySelectorAll('.view').forEach(function(v) {
            v.classList.remove('active');
        });
        var el = $('view-' + viewName);
        if (el) {
            el.classList.add('active');
            state.currentView = viewName;
        }
    }

    /* ============================================================
     *  Toast 提示
     * ============================================================ */
    function showToast(msg) {
        var toast = document.createElement('div');
        toast.className = 'toast';
        toast.textContent = msg;
        document.body.appendChild(toast);
        setTimeout(function() {
            if (toast.parentNode) toast.remove();
        }, 2500);
    }

    /* ============================================================
     *  WebSocket 连接管理
     * ============================================================ */
    function connectWebSocket() {
        var protocol = (location.protocol === 'https:') ? 'wss://' : 'ws://';
        var url = protocol + location.host + '/ws/game';

        try {
            state.ws = new WebSocket(url);
        } catch (e) {
            showToast('无法连接服务器');
            return;
        }

        state.ws.onopen = function() {
            console.log('[WS] 已连接');
        };

        state.ws.onmessage = function(event) {
            try {
                var msg = JSON.parse(event.data);
                handleServerMessage(msg);
            } catch (e) {
                console.error('[WS] 消息解析失败:', e);
            }
        };

        state.ws.onclose = function() {
            console.log('[WS] 连接断开');
            if (state.currentView !== 'lobby' && state.currentView !== 'result') {
                showToast('连接已断开，请刷新重试');
            }
        };

        state.ws.onerror = function(err) {
            console.error('[WS] 连接错误:', err);
            showToast('服务器连接失败，请检查网络');
        };
    }

    function sendMessage(msg) {
        if (state.ws && state.ws.readyState === WebSocket.OPEN) {
            state.ws.send(JSON.stringify(msg));
        } else {
            showToast('未连接服务器，请稍后重试');
        }
    }

    /* ============================================================
     *  服务端消息处理
     * ============================================================ */
    function handleServerMessage(msg) {
        switch (msg.type) {

            /* ---------- 游戏开始 ---------- */
            case 'game_start':
                state.players = msg.players || [];
                // 初始化分数
                state.scores = {};
                if (msg.players) {
                    msg.players.forEach(function(p) { state.scores[p.id] = 0; });
                }
                updateScoreboard();

                // 显示游戏开始动画
                showGameStartOverlay(function() {
                    switchView('game');
                });
                break;

            /* ---------- 新回合 ---------- */
            case 'new_round':
                handleNewRound(msg);
                break;

            /* ---------- TTS 朗读 ---------- */
            case 'tts_speak':
                speakText(msg.text, msg.rate, msg.pitch);
                break;

            /* ---------- 答题结果 ---------- */
            case 'answer_result':
                handleAnswerResult(msg);
                break;

            /* ---------- 游戏结束 ---------- */
            case 'game_over':
                handleGameOver(msg);
                break;

            /* ---------- 诗词赏析 ---------- */
            case 'poem_analysis':
                handlePoemAnalysis(msg);
                break;

            /* ---------- 错误 ---------- */
            case 'error':
                showToast(msg.message || '发生错误');
                break;

            default:
                console.log('[WS] 未知消息类型:', msg.type, msg);
        }
    }

    /* ============================================================
     *  游戏开始动画
     * ============================================================ */
    function showGameStartOverlay(callback) {
        var overlay = document.createElement('div');
        overlay.className = 'game-start-overlay';
        overlay.innerHTML = '<div class="game-start-text">比赛开始</div>';
        document.body.appendChild(overlay);

        setTimeout(function() {
            overlay.classList.add('fade-out');
            setTimeout(function() {
                overlay.remove();
                if (callback) callback();
            }, 600);
        }, 1600);
    }

    /* ============================================================
     *  新回合处理
     * ============================================================ */
    function handleNewRound(msg) {
        state.currentRound  = msg.round_number;
        state.currentPlayerId = msg.current_player;
        state.recognitionText = '';
        state.timerStarted  = false;
        state.answerSubmitted = false;

        // 确保在比赛视图
        if (state.currentView !== 'game') {
            switchView('game');
        }

        // 更新回合信息
        $('round-number').textContent = '第 ' + msg.round_number + ' 回合';
        $('current-turn').textContent = '轮到 ' + (msg.current_player_name || '玩家') + ' 答题';

        // 诗词信息
        var poemInfo = '';
        if (msg.poem_title) poemInfo += '《' + msg.poem_title + '》';
        if (msg.poem_author) poemInfo += ' — ' + msg.poem_author;
        $('poem-info').textContent = poemInfo;

        // 上句
        $('upper-line').textContent = msg.upper_line || '';

        // 清空反馈区
        $('feedback-area').innerHTML = '';

        // 重置识别结果
        var resultEl = $('recognize-result');
        resultEl.textContent = '语音识别结果将显示在这里';
        resultEl.classList.add('empty');

        // 更新计分板高亮
        updateScoreboardHighlight(msg.current_player);

        // 本地模式：说话按钮和文字输入均可用
        var speakBtn = $('btn-speak');
        speakBtn.disabled = false;
        $('speak-hint').textContent = '请 ' + (msg.current_player_name || '玩家') + ' 按住按钮回答';

        // 启用文字输入备选
        $('input-answer').disabled = false;
        $('input-answer').value = '';
        $('btn-submit-text').disabled = false;

        // 重置倒计时显示
        resetCountdownDisplay(msg.time_limit || 60);
    }

    /* ============================================================
     *  计分板
     * ============================================================ */
    function updateScoreboard() {
        if (state.players.length >= 2) {
            var p1 = state.players[0];
            var p2 = state.players[1];
            $('player1-name').textContent  = p1.name;
            $('player2-name').textContent  = p2.name;
            $('player1-score').textContent = state.scores[p1.id] || 0;
            $('player2-score').textContent = state.scores[p2.id] || 0;
        }
    }

    function updateScoreboardHighlight(currentPlayerId) {
        var box1 = $('player1-box');
        var box2 = $('player2-box');
        box1.classList.remove('active-player');
        box2.classList.remove('active-player');
        if (state.players.length >= 2) {
            if (currentPlayerId === state.players[0].id) {
                box1.classList.add('active-player');
            } else if (currentPlayerId === state.players[1].id) {
                box2.classList.add('active-player');
            }
        }
    }

    /* ============================================================
     *  答题结果处理
     * ============================================================ */
    function handleAnswerResult(msg) {
        // 停止倒计时
        stopCountdown();

        // 禁用说话按钮
        $('btn-speak').disabled = true;

        // 停止录音（如果正在进行）—— 必须在设置 isRecording=false 之前调用
        if (state.isRecording) {
            _cleanupIflytek();
        }

        state.isRecording = false;
        var speakBtn = $('btn-speak');
        speakBtn.classList.remove('recording');
        $('speak-text').innerHTML = '按住<br>说话';

        // 禁用文字输入
        $('input-answer').disabled = true;
        $('btn-submit-text').disabled = true;

        // 更新分数
        if (msg.current_scores) {
            state.scores = msg.current_scores;
            updateScoreboard();
        }

        // 显示飘分动画
        if (msg.score_change && msg.score_change !== 0) {
            var targetPlayerId = msg.player_id;
            showScoreFloat(targetPlayerId, msg.score_change);
        }

        // 显示反馈信息
        var feedbackArea = $('feedback-area');
        var questionCard = $('question-card');
        var feedbackHtml = '';

        if (msg.correct) {
            feedbackHtml = '<div class="feedback-msg correct">'
                + '<strong>' + escapeHtml(msg.player_name || '玩家') + '</strong> 回答正确！';
            // 绿色光晕
            questionCard.classList.remove('glow-wrong');
            questionCard.classList.add('glow-correct');
            setTimeout(function() { questionCard.classList.remove('glow-correct'); }, 900);
        } else {
            feedbackHtml = '<div class="feedback-msg wrong">'
                + '<strong>' + escapeHtml(msg.player_name || '玩家') + '</strong> 回答错误';
            // 红色闪烁
            questionCard.classList.remove('glow-correct');
            questionCard.classList.add('glow-wrong');
            setTimeout(function() { questionCard.classList.remove('glow-wrong'); }, 700);
        }

        // 显示答案对比
        if (msg.answer !== undefined && msg.answer !== null) {
            var answerText = msg.answer || '(未作答)';
            feedbackHtml += '<br>回答：' + escapeHtml(answerText);
        }
        if (!msg.correct && msg.expected_answer) {
            feedbackHtml += '<br>正确答案：' + escapeHtml(msg.expected_answer);
        }

        feedbackHtml += '</div>';
        feedbackArea.innerHTML = feedbackHtml;
    }

    /* ============================================================
     *  飘分动画
     * ============================================================ */
    function showScoreFloat(playerId, change) {
        var scoreBox;
        if (state.players.length >= 2) {
            if (playerId === state.players[0].id) {
                scoreBox = $('player1-box');
            } else {
                scoreBox = $('player2-box');
            }
        } else {
            scoreBox = $('player1-box');
        }

        var floater = document.createElement('div');
        floater.className = 'score-float ' + (change > 0 ? 'positive' : 'negative');
        floater.textContent = (change > 0 ? '+' : '') + change;
        floater.style.left = '50%';
        floater.style.top = '-5px';
        floater.style.transform = 'translateX(-50%)';

        scoreBox.style.position = 'relative';
        scoreBox.appendChild(floater);

        setTimeout(function() {
            if (floater.parentNode) floater.remove();
        }, 1700);
    }

    /* ============================================================
     *  游戏结束
     * ============================================================ */
    function handleGameOver(msg) {
        stopCountdown();
        $('btn-speak').disabled = true;
        $('input-answer').disabled = true;
        $('btn-submit-text').disabled = true;

        // 更新最终分数
        if (msg.final_scores) {
            state.scores = msg.final_scores;
            updateScoreboard();
        }

        // 判断胜负
        var titleEl = $('result-title');
        if (msg.winner === 'draw' || msg.winner === null) {
            titleEl.textContent = '平局';
            titleEl.className = 'result-title draw';
        } else {
            titleEl.textContent = (msg.winner_name || '玩家') + ' 获胜！';
            titleEl.className = 'result-title win';
        }

        // 最终比分
        if (state.players.length >= 2) {
            var p1 = state.players[0];
            var p2 = state.players[1];
            $('result-p1-name').textContent  = p1.name;
            $('result-p2-name').textContent  = p2.name;
            $('result-p1-score').textContent = state.scores[p1.id] || 0;
            $('result-p2-score').textContent = state.scores[p2.id] || 0;

            var rp1 = $('result-p1');
            var rp2 = $('result-p2');
            rp1.classList.remove('winner');
            rp2.classList.remove('winner');
            if (msg.winner === p1.id) rp1.classList.add('winner');
            if (msg.winner === p2.id) rp2.classList.add('winner');
        }

        $('result-rounds').textContent = '共 ' + (msg.total_rounds || 0) + ' 回合';

        // 显示加载动画（LLM 生成解析可能需要几秒）

    /* ============================================================
     *  诗词赏析
     * ============================================================ */
    function handlePoemAnalysis(msg) {
        var container = $('poem-analysis-container');
        container.innerHTML = '';

        if (!msg.poems || msg.poems.length === 0) {
            container.innerHTML = '<p style="text-align:center;color:rgba(44,62,80,0.4);padding:20px;">暂无诗词赏析数据</p>';
            return;
        }

        msg.poems.forEach(function(poem, index) {
            try {
            var card = document.createElement('div');
            card.className = 'card poem-analysis-card';

            var html = '';

            // 玩家标签
            if (poem.player_name) {
                html += '<div class="player-badge">';
                html += '<span class="player-badge-icon">👤</span>';
                html += '<span class="player-badge-name">' + escapeHtml(poem.player_name) + '</span>';
                html += '<span class="player-badge-label">的答错诗词</span>';
                html += '</div>';
            }

            // 标题和作者
            html += '<div class="poem-header">';
            html += '<div class="poem-title-text">' + escapeHtml(poem.title || '无题') + '</div>';
            html += '<div class="poem-meta">'
                + escapeHtml(poem.author || '佚名')
                + (poem.dynasty ? ' · ' + escapeHtml(poem.dynasty) : '')
                + '</div>';
            html += '</div>';

            // 全文
            if (poem.content) {
                var lines = poem.content.split('\n');
                var contentHtml = lines.map(function(line) {
                    return escapeHtml(line.trim());
                }).filter(function(line) { return line; }).join('<br>');
                html += '<div class="poem-content">' + contentHtml + '</div>';
            }

            // 创作背景
            if (poem.background) {
                html += buildSection('创作背景', escapeHtml(poem.background));
            }

            // 白话译文
            if (poem.translation) {
                html += buildSection('白话译文', escapeHtml(poem.translation));
            }

            // 逐句赏析
            if (poem.appreciation) {
                html += buildSection('逐句赏析', escapeHtml(poem.appreciation));
            }

            // 艺术手法
            if (poem.technique) {
                html += buildSection('艺术手法', escapeHtml(poem.technique));
            }

            // 名句点评
            if (poem.famous_lines && poem.famous_lines.length > 0) {
                html += '<div class="analysis-section">';
                html += '<div class="analysis-section-title">名句点评</div>';
                if (Array.isArray(poem.famous_lines)) {
                    poem.famous_lines.forEach(function(line) {
                        html += '<div class="famous-line">';
                        if (typeof line === 'string') {
                            html += '<div class="line-text">' + escapeHtml(line) + '</div>';
                        } else {
                            if (line.line)  html += '<div class="line-text">' + escapeHtml(line.line) + '</div>';
                            if (line.comment) html += '<div class="line-comment">' + escapeHtml(line.comment) + '</div>';
                        }
                        html += '</div>';
                    });
                } else {
                    html += '<div class="analysis-content">' + escapeHtml(poem.famous_lines) + '</div>';
                }
                html += '</div>';
            }

            // 主题思想
            if (poem.theme) {
                html += '<div class="analysis-section">';
                html += '<div class="analysis-section-title">主题思想</div>';
                html += '<div class="theme-box">' + escapeHtml(poem.theme) + '</div>';
                html += '</div>';
            }

            // 解析来源标签
            html += '<div class="analysis-source">';
            if (poem.llm_generated) {
                html += '<span class="source-badge source-ai">🤖 AI 生成解析</span>';
            } else {
                html += '<span class="source-badge source-preset">📖 预置解析</span>';
            }
            html += '</div>';

            card.innerHTML = html;
            container.appendChild(card);
            } catch(e) {
                console.error('[诗词赏析] 渲染第' + (index+1) + '首诗词失败:', e, poem);
                var errCard = document.createElement('div');
                errCard.className = 'card poem-analysis-card';
                errCard.innerHTML = '<div style="padding:20px;text-align:center;color:#c0392b;">'
                    + '<p>《' + escapeHtml(poem.title || '未知') + '》渲染失败</p>'
                    + '<p style="font-size:12px;opacity:0.6;">' + escapeHtml(e.message) + '</p>'
                    + '</div>';
                container.appendChild(errCard);
            }
        });
    }

    /** 构建一个赏析小节 */
    function buildSection(title, content) {
        return '<div class="analysis-section">'
            + '<div class="analysis-section-title">' + title + '</div>'
            + '<div class="analysis-content">' + content + '</div>'
            + '</div>';
    }

    /* ============================================================
     *  倒计时（环形 SVG 进度条）
     * ============================================================ */
    var CIRCUMFERENCE = 2 * Math.PI * 42; // ≈ 263.89

    function startCountdown(seconds) {
        stopCountdown();
        state.countdownValue = seconds;
        state.timerStarted = true;

        var progressEl = $('countdown-progress');
        var textEl     = $('countdown-text');

        // 初始状态
        progressEl.style.strokeDashoffset = '0';
        progressEl.classList.remove('warning');
        textEl.classList.remove('warning');
        textEl.textContent = seconds;

        state.countdownTimer = setInterval(function() {
            state.countdownValue--;

            if (state.countdownValue <= 0) {
                // 时间到
                progressEl.style.strokeDashoffset = String(CIRCUMFERENCE);
                textEl.textContent = '0';
                stopCountdown();
                onCountdownEnd();
                return;
            }

            // 更新进度
            var offset = CIRCUMFERENCE * (1 - state.countdownValue / seconds);
            progressEl.style.strokeDashoffset = String(offset);
            textEl.textContent = String(state.countdownValue);

            // 最后5秒警示
            if (state.countdownValue <= 5) {
                progressEl.classList.add('warning');
                textEl.classList.add('warning');
            }
        }, 1000);
    }

    function stopCountdown() {
        if (state.countdownTimer) {
            clearInterval(state.countdownTimer);
            state.countdownTimer = null;
        }
        state.timerStarted = false;
    }

    function resetCountdownDisplay(seconds) {
        stopCountdown();
        var progressEl = $('countdown-progress');
        var textEl     = $('countdown-text');
        progressEl.style.strokeDashoffset = '0';
        progressEl.classList.remove('warning');
        textEl.classList.remove('warning');
        textEl.textContent = String(seconds);
    }

    function onCountdownEnd() {
        // 停止录音
        if (state.isRecording) {
            stopRecording();
        }

        // 禁用按钮
        $('btn-speak').disabled = true;
        $('input-answer').disabled = true;
        $('btn-submit-text').disabled = true;

        // 通知服务端超时
        sendMessage({ type: 'timeout' });
    }

    /* ============================================================
     *  文字输入提交答案
     * ============================================================ */
    function submitTextAnswer() {
        var text = $('input-answer').value.trim();
        if (!text) {
            showToast('请输入答案');
            $('input-answer').focus();
            return;
        }

        // 防止重复提交
        if (state.answerSubmitted) return;
        state.answerSubmitted = true;

        // 停止倒计时
        stopCountdown();

        // 禁用输入
        $('input-answer').disabled = true;
        $('btn-submit-text').disabled = true;
        $('btn-speak').disabled = true;

        // 显示输入的文字
        var resultEl = $('recognize-result');
        resultEl.textContent = text;
        resultEl.classList.remove('empty');

        // 发送给服务端
        sendMessage({ type: 'stop_recording', text: text });
    }

    /* ============================================================
     *  语音识别（科大讯飞 WebSocket 流式方案）
     * ============================================================ */
    function initSpeechRecognition() {
        // 检查浏览器是否支持所需 API
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
            state.speechSupported = false;
            console.warn('[语音] 当前浏览器不支持 getUserMedia');
            return;
        }
        if (typeof lamejs === 'undefined') {
            state.speechSupported = false;
            console.warn('[语音] lamejs 库未加载，语音识别不可用');
            return;
        }
        if (!window.AudioContext && !window.webkitAudioContext) {
            state.speechSupported = false;
            console.warn('[语音] 当前浏览器不支持 Web Audio API');
            return;
        }
        console.log('[语音] 讯飞语音识别已就绪');
    }

    /** 获取讯飞鉴权 WebSocket URL */
    async function fetchIflytekWsUrl() {
        try {
            var resp = await fetch('/api/iflytek/ws_url');
            var data = await resp.json();
            if (data.error) {
                console.error('[讯飞] 获取鉴权URL失败:', data.error);
                return null;
            }
            return data;
        } catch (e) {
            console.error('[讯飞] 请求鉴权URL异常:', e);
            return null;
        }
    }

    /** 将 Int16 PCM 数组编码为 base64 */
    function pcmToBase64(pcmData) {
        var bytes = new Uint8Array(pcmData.length * 2);
        for (var i = 0; i < pcmData.length; i++) {
            bytes[i * 2] = pcmData[i] & 0xff;
            bytes[i * 2 + 1] = (pcmData[i] >> 8) & 0xff;
        }
        var binary = '';
        for (var j = 0; j < bytes.length; j++) {
            binary += String.fromCharCode(bytes[j]);
        }
        return btoa(binary);
    }

    /** 启动讯飞录音 + WebSocket 流式识别 */
    function startRecording() {
        if ($('btn-speak').disabled) return;
        if (state.isRecording) return;

        // 同步设置录音状态（解决异步竞态：getUserMedia 是异步的，用户可能在回调前松手）
        state.isRecording = true;
        state.recordingIntent = true;
        state.answerSubmitted = false;

        // 停止当前 TTS 播放
        if (window.speechSynthesis) speechSynthesis.cancel();

        state.recognitionText = '';
        state.iflytekFinalText = '';
        state.iflytekIsFirstFrame = true;

        var resultEl = $('recognize-result');
        resultEl.textContent = '正在连接讯飞...';
        resultEl.classList.remove('empty');

        // 获取鉴权 URL 并启动录音
        fetchIflytekWsUrl().then(function(data) {
            if (!data || !data.url) {
                showToast('语音服务不可用，请检查后端配置');
                return;
            }

            state.iflytekAppId = data.app_id || '';
            if (state.debugNoMic) {
                // 调试模式：验证连接 + 弹出文字输入模拟
                _debugTestConnection(data.url);
            } else {
                _startIflytekRecording(data.url, data.app_id);
            }
        });
    }

    /** 调试模式：验证讯飞连接 + 文字输入模拟语音识别 */
    function _debugTestConnection(wsUrl) {
        var ws = new WebSocket(wsUrl);
        var connected = false;

        var timeout = setTimeout(function() {
            if (!connected) {
                showToast('讯飞连接超时');
                try { ws.close(); } catch(e) {}
            }
        }, 8000);

        ws.onopen = function() {
            connected = true;
            clearTimeout(timeout);
            console.log('[调试] 讯飞 WebSocket 连接成功');

            // 发送一个空帧 + 结束帧来验证完整流程
            var firstFrame = {
                data: { status: 0, format: 'audio/L16;rate=16000', encoding: 'lame', audio: '' }
            };
            ws.send(JSON.stringify(firstFrame));
        };

        ws.onmessage = function(event) {
            try {
                var resp = JSON.parse(event.data);
                if (resp.code === 0) {
                    console.log('[调试] 讯飞响应正常, status=' + (resp.data ? resp.data.status : '?'));
                    if (resp.data && resp.data.status === 2) {
                        ws.close();
                        _showDebugInput();
                    }
                } else {
                    console.warn('[调试] 讯飞返回错误 code=' + resp.code);
                    ws.close();
                    _showDebugInput();
                }
            } catch(e) {
                console.error('[调试] 解析响应失败:', e);
                ws.close();
                _showDebugInput();
            }
        };

        ws.onerror = function(e) {
            console.error('[调试] WebSocket 错误:', e);
            showToast('讯飞连接失败，请检查配置');
        };

        ws.onclose = function() {
            console.log('[调试] WebSocket 已关闭');
        };
    }

    /** 调试模式：显示文字输入弹层模拟语音识别结果 */
    function _showDebugInput() {
        // 更新 UI 为录音状态
        state.isRecording = true;
        state.recordingIntent = true;
        $('btn-speak').classList.add('recording');

            + '<input id="debug-mic-input" type="text" placeholder="输入模拟语音识别结果..." '
            + 'style="width:100%;margin-top:8px;padding:8px 12px;border:2px solid #e67e22;border-radius:8px;'
            + 'font-size:15px;outline:none;font-family:inherit;" '

        setTimeout(function() {

    /** 调试模式：提交模拟输入 */
    function _debugSubmitInput() {
        if (state.answerSubmitted) return;
        state.answerSubmitted = true;

        var inp = document.getElementById('debug-mic-input');
        var text = inp ? inp.value.trim() : '';

        // 发送答案给游戏后端
